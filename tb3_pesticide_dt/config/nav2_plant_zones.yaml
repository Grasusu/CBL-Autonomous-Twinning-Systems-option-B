plant_nav2_mission_node:
  ros__parameters:
    start_automatically: true
    source_entity: gazebo_nav2_robot
    nav_action_name: navigate_to_pose
    state_topic: /dt/physical/mission_state
    inspection_request_topic: /dt/physical/inspection_request
    inspection_result_topic: /dt/digital/inspection_result
    digital_state_topic: /dt/digital/mission_state
    inspection_log_topic: /dt/physical/inspection_log

    frame_id: map
    publish_initial_pose: true
    # AMCL/map pose of the Gazebo/world start position.
    initial_pose_x: -0.80
    initial_pose_y: -0.07
    initial_pose_yaw: 0.0
    # The home return is an explicit final Nav2 waypoint below (plant_home).
    # Keeping it in the route makes the demo easy to verify in logs.
    return_to_start: false
    # Nav2 map coordinate that corresponds to Gazebo/world home near (0, 0).
    home_x: -0.80
    home_y: -0.07
    home_yaw: 0.0
    use_captured_home_pose: false

    # First six stops are inspected. plant_home is the hardcoded final
    # waypoint back to the start and is not inspected.
    zone_ids: ["plant_a", "plant_b", "plant_c", "plant_d", "plant_e", "plant_f", "plant_home"]
    zone_names: ["North west plant", "North east plant", "East center plant", "Middle center plant", "West center plant", "Home-side plant", "Home / Start"]
    # These are scan poses, not plant centers.  Each pose is about 0.55 m
    # from the visual plant marker so the robot stops at a consistent distance.
    zone_x: [-0.60, 0.80, 1.35, 0.60, -0.30, -0.80, -0.80]
    zone_y: [0.35, 0.35, 0.10, -0.10, -0.30, -0.10, -0.07]
    # Each yaw points the robot toward the nearby plant marker.
    zone_yaw: [0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.0]
    zone_plant_stress_indices: [0.18, 0.74, 0.31, 0.56, 0.81, 0.44, 0.0]
    zone_expected_statuses: ["OK", "TREATMENT_NEEDED", "OK", "TREATMENT_NEEDED", "TREATMENT_NEEDED", "OK", "RETURN_HOME"]

    control_period_s: 0.20
    wait_for_nav2_timeout_s: 60.0
    goal_timeout_s: 180.0
    # If Nav2 reaches the plant but refuses to report SUCCEEDED because of
    # final yaw/costmap jitter, accept the waypoint and start inspection.
    accept_near_goal_distance_m: 0.12
    accept_near_home_distance_m: 0.18
    accept_near_goal_after_s: 6.0
    goal_retry_delay_s: 5.0
    max_goal_retries: 8
    retry_fast_failure_window_s: 20.0
    inspection_duration_s: 7.0
    inspection_result_timeout_s: 10.0
    treatment_alert_hold_s: 2.0
    summary_republish_period_s: 5.0
    initial_pose_settle_s: 8.0

inspection_twin_node:
  ros__parameters:
    physical_state_topic: /dt/physical/mission_state
    state_topic: /dt/digital/mission_state
    inspection_request_topic: /dt/physical/inspection_request
    inspection_result_topic: /dt/digital/inspection_result
    safety_state_topic: /dt/safety_state
    marker_topic: /dt/digital/plant_markers
    environment_state_topic: /dt/physical/environment_state
    digital_control_topic: /dt/digital/control

    zone_ids: ["plant_a", "plant_b", "plant_c", "plant_d", "plant_e", "plant_f", "plant_home"]
    zone_names: ["North west plant", "North east plant", "East center plant", "Middle center plant", "West center plant", "Home-side plant", "Home / Start"]
    zone_x: [-0.60, 0.80, 1.35, 0.60, -0.30, -0.80, -0.80]
    zone_y: [0.35, 0.35, 0.10, -0.10, -0.30, -0.10, -0.07]
    zone_yaw: [0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.0]
    zone_plant_stress_indices: [0.18, 0.74, 0.31, 0.56, 0.81, 0.44, 0.0]
    zone_expected_statuses: ["OK", "TREATMENT_NEEDED", "OK", "TREATMENT_NEEDED", "TREATMENT_NEEDED", "OK", "RETURN_HOME"]

    plant_stress_threshold: 0.50
    processing_delay_s: 1.0
    camera_health: healthy
    frame_id: map

